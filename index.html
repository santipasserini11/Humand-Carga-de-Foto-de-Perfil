<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga masiva de fotos de perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #F4F7FA; color: #1E293B; }
        /* Logo centrado y con el color #182E7B */
        .humand-logo { 
            font-family: 'Comfortaa', cursive; 
            color: #182E7B; 
            font-size: 32px; 
            text-align: center;
            display: block;
            margin: 0 auto 40px auto;
        }
        .main-card { background: white; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); }
        .btn-primary { background-color: #496BE3; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #3855c4; transform: translateY(-1px); }
        .spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [zipFile, setZipFile] = useState(null);
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);

            const processFiles = async () => {
                if (!apiKey || !zipFile) return alert("Por favor, completa los campos.");
                setLoading(true);
                setResults([]);

                try {
                    const zip = new JSZip();
                    const content = await zip.loadAsync(zipFile);
                    const files = Object.values(content.files).filter(f => 
                        !f.dir && !f.name.startsWith('.') && !f.name.includes('__MACOSX') && /\.(jpg|jpeg|png|webp)$/i.test(f.name)
                    );

                    for (let file of files) {
                        const fileName = file.name.split('/').pop();
                        const employeeid = fileName.split('.')[0];
                        const blob = await file.async("blob");
                        const formData = new FormData();
                        formData.append('file', blob, fileName);

                        try {
                            const response = await fetch(`https://api-prod.humand.co/public/api/v1/users/${employeeid}/profile-picture`, {
                                method: 'PUT',
                                headers: { 'Authorization': `Basic ${apiKey.trim()}` },
                                body: formData
                            });

                            const isOk = response.status === 200;
                            let msg = isOk ? `Usuario ${employeeid} sincronizado correctamente` : "Error desconocido";
                            if (response.status === 401) msg = "API KEY no válida";
                            if (response.status === 404) msg = "Usuario no encontrado";
                            if (response.status === 400) msg = "Error al sincronizar (Verificar permisos)";

                            setResults(prev => [...prev, { id: employeeid, status: isOk ? 'success' : 'error', msg }]);
                        } catch (err) {
                            setResults(prev => [...prev, { id: employeeid, status: 'error', msg: "Error de red" }]);
                        }
                    }
                } catch (e) { alert("Error al procesar el ZIP"); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen py-16 px-6">
                    <div className="max-w-3xl mx-auto">
                        {/* Logo Centrado */}
                        <div className="humand-logo lowercase">humand</div>
                        
                        <header className="text-center mb-12">
                            <h1 className="text-4xl font-bold text-[#1E293B] mb-4 tracking-tight">Carga masiva de fotos de perfil</h1>
                            <p className="text-slate-500 text-lg leading-relaxed">Herramienta para vincular fotos a usuarios en Humand de forma masiva.</p>
                        </header>

                        <div className="main-card p-10 md:p-14 space-y-10">
                            <div>
                                <label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest block mb-3">API Key de Acceso</label>
                                <input type="password" placeholder="Pega tu token aquí..." className="w-full p-5 bg-[#F8FAFC] border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-[#496BE3]" onChange={e => setApiKey(e.target.value)} />
                            </div>

                            <div className="border-2 border-dashed border-slate-200 rounded-[32px] p-12 text-center cursor-pointer hover:bg-slate-50 transition-colors" onClick={() => document.getElementById('zip').click()}>
                                <input type="file" id="zip" accept=".zip" className="hidden" onChange={e => setZipFile(e.target.files[0])} />
                                <div className="text-[#496BE3] font-bold text-xl mb-2">{zipFile ? "ZIP Listo" : "Sube tu archivo ZIP"}</div>
                                <p className="text-slate-400 text-sm">{zipFile ? zipFile.name : "Arrastra tu archivo aquí o haz clic para seleccionarlo"}</p>
                            </div>

                            <button onClick={processFiles} disabled={loading} className="btn-primary w-full text-white py-6 rounded-[24px] font-bold uppercase tracking-[0.2em] shadow-xl flex items-center justify-center gap-4">
                                {loading && <div className="spinner"></div>}
                                {loading ? "Procesando..." : "Iniciar Proceso"}
                            </button>
                        </div>

                        <div className="mt-12 space-y-4">
                            {results.map((res, i) => (
                                <div key={i} className={`p-5 rounded-3xl border flex justify-between items-center ${res.status === 'success' ? 'bg-emerald-50 border-emerald-100 text-emerald-800' : 'bg-rose-50 border-rose-100 text-rose-800'}`}>
                                    <span className="font-bold tracking-tight">ID: {res.id}</span>
                                    <span className="text-xs font-black uppercase tracking-widest">{res.msg}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
