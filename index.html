<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga masiva de fotos de perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #F4F7FA; color: #1E293B; }
        .humand-logo { font-family: 'Comfortaa', cursive; color: #182E7B; font-size: 32px; text-align: center; display: block; margin: 0 auto 40px auto; }
        .main-card { background: white; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); }
        .btn-primary { background-color: #496BE3; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #3855c4; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.7; transform: none; cursor: not-allowed; }
        .spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [zipFile, setZipFile] = useState(null);
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [progress, setProgress] = useState({ current: 0, total: 0 });

            const processFiles = async () => {
                if (!apiKey || !zipFile) return alert("Por favor, completa los campos.");
                setLoading(true);
                setResults([]);
                setProgress({ current: 0, total: 0 });

                try {
                    const zip = new JSZip();
                    const content = await zip.loadAsync(zipFile);
                    const files = Object.values(content.files).filter(f =>
                        !f.dir &&
                        !f.name.startsWith('.') &&
                        !f.name.includes('__MACOSX') &&
                        /\.(jpg|jpeg|png|webp)$/i.test(f.name)
                    );

                    setProgress({ current: 0, total: files.length });

                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const fileName = file.name.split('/').pop();
                        const employeeid = fileName.split('.')[0];

                        // ✅ FIX: Detectar MIME type según extensión
                        const ext = fileName.split('.').pop().toLowerCase();
                        const mimeMap = {
                            jpg: 'image/jpeg',
                            jpeg: 'image/jpeg',
                            png: 'image/png',
                            webp: 'image/webp'
                        };
                        const mimeType = mimeMap[ext] || 'image/jpeg';

                        const rawBlob = await file.async("blob");
                        const typedBlob = new Blob([rawBlob], { type: mimeType });

                        const formData = new FormData();
                        formData.append('file', typedBlob, fileName);

                        try {
                            const response = await fetch(`https://api-prod.humand.co/public/api/v1/users/${employeeid}/profile-picture`, {
                                method: 'PUT',
                                headers: { 'Authorization': `Basic ${apiKey.trim()}` },
                                body: formData
                            });

                            const isOk = response.status === 200;
                            let msg = isOk ? `Foto sincronizada` : "Error desconocido";
                            if (response.status === 401) msg = "API KEY no válida";
                            if (response.status === 404) msg = "Usuario no encontrado";
                            if (response.status === 400) msg = "Error al sincronizar";

                            setResults(prev => [...prev, { id: employeeid, status: isOk ? 'success' : 'error', msg }]);
                        } catch (err) {
                            setResults(prev => [...prev, { id: employeeid, status: 'error', msg: "Error de red" }]);
                        }

                        setProgress({ current: i + 1, total: files.length });
                    }
                } catch (e) {
                    alert("Error al procesar el ZIP: " + e.message);
                }

                setLoading(false);
            };

            const successCount = results.filter(r => r.status === 'success').length;
            const errorCount = results.filter(r => r.status === 'error').length;

            return (
                <div className="min-h-screen py-16 px-6">
                    <div className="max-w-3xl mx-auto">
                        <div className="humand-logo lowercase">humand</div>

                        <header className="text-center mb-12">
                            <h1 className="text-4xl font-bold text-[#1E293B] mb-4 tracking-tight">Carga masiva de fotos de perfil</h1>
                            <p className="text-slate-500 text-lg leading-relaxed">
                                Herramienta para cargar fotos de perfil de empleados masivamente y vincularlas a cada usuario en Humand.
                            </p>
                        </header>

                        <div className="main-card p-10 md:p-14 space-y-10">
                            <div>
                                <label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest block mb-3 ml-1">API Key de Acceso</label>
                                <input
                                    type="password"
                                    placeholder="Pega tu token aquí..."
                                    className="w-full p-5 bg-[#F8FAFC] border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-[#496BE3]"
                                    onChange={e => setApiKey(e.target.value)}
                                />
                            </div>

                            <div className="space-y-6">
                                <label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest block ml-1">Sube tu archivo ZIP</label>
                                <div
                                    className="border-2 border-dashed border-slate-200 rounded-[32px] p-12 text-center cursor-pointer hover:bg-slate-50 transition-colors"
                                    onClick={() => document.getElementById('zip').click()}
                                >
                                    <input type="file" id="zip" accept=".zip" className="hidden" onChange={e => setZipFile(e.target.files[0])} />
                                    <div className="text-[#496BE3] font-bold text-xl mb-2">{zipFile ? "✅ Archivo cargado" : "Seleccionar archivo ZIP"}</div>
                                    <p className="text-slate-400 text-sm">{zipFile ? zipFile.name : "Arrastrá tu archivo aquí o hacé clic para seleccionarlo"}</p>
                                    {zipFile && (
                                        <p className="text-slate-400 text-xs mt-1">{(zipFile.size / (1024 * 1024)).toFixed(2)} MB</p>
                                    )}
                                </div>

                                <div className="text-slate-500 text-sm leading-relaxed px-2 space-y-2">
                                    <p><span className="font-bold uppercase text-[11px] tracking-wider">Capacidad máxima:</span> 50 MB por archivo ZIP.</p>
                                    <p><span className="font-bold uppercase text-[11px] tracking-wider">Formatos admitidos:</span> .jpg, .jpeg, .png y .webp.</p>
                                    <p><span className="font-bold uppercase text-[11px] tracking-wider">Nombre de archivo:</span> Cada imagen debe llamarse con el ID del empleado (ej: <code className="bg-slate-100 px-1 rounded">41492420.jpg</code>).</p>
                                    <p><span className="font-bold uppercase text-[11px] tracking-wider">Configuración:</span> Asegurate de tener habilitado el cambio de foto de perfil en los ajustes de Humand.</p>
                                </div>
                            </div>

                            {/* Barra de progreso */}
                            {loading && progress.total > 0 && (
                                <div className="space-y-2">
                                    <div className="flex justify-between text-xs text-slate-400 font-bold uppercase tracking-widest">
                                        <span>Procesando...</span>
                                        <span>{progress.current} / {progress.total}</span>
                                    </div>
                                    <div className="w-full bg-slate-100 rounded-full h-2">
                                        <div
                                            className="bg-[#496BE3] h-2 rounded-full transition-all duration-300"
                                            style={{ width: `${(progress.current / progress.total) * 100}%` }}
                                        />
                                    </div>
                                </div>
                            )}

                            <button
                                onClick={processFiles}
                                disabled={loading}
                                className="btn-primary w-full text-white py-6 rounded-[24px] font-bold uppercase tracking-[0.2em] shadow-xl flex items-center justify-center gap-4"
                            >
                                {loading && <div className="spinner"></div>}
                                {loading ? "Procesando..." : "Iniciar Proceso"}
                            </button>
                        </div>

                        {/* Resumen */}
                        {results.length > 0 && !loading && (
                            <div className="mt-8 flex gap-4">
                                <div className="flex-1 bg-emerald-50 border border-emerald-100 rounded-3xl p-5 text-center">
                                    <div className="text-3xl font-bold text-emerald-700">{successCount}</div>
                                    <div className="text-xs font-black uppercase tracking-widest text-emerald-600 mt-1">Sincronizados</div>
                                </div>
                                <div className="flex-1 bg-rose-50 border border-rose-100 rounded-3xl p-5 text-center">
                                    <div className="text-3xl font-bold text-rose-700">{errorCount}</div>
                                    <div className="text-xs font-black uppercase tracking-widest text-rose-600 mt-1">Con error</div>
                                </div>
                            </div>
                        )}

                        {/* Resultados */}
                        <div className="mt-6 space-y-3">
                            {results.map((res, i) => (
                                <div
                                    key={i}
                                    className={`p-5 rounded-3xl border flex justify-between items-center ${
                                        res.status === 'success'
                                            ? 'bg-emerald-50 border-emerald-100 text-emerald-800'
                                            : 'bg-rose-50 border-rose-100 text-rose-800'
                                    }`}
                                >
                                    <span className="font-bold tracking-tight">
                                        {res.status === 'success' ? '✅' : '❌'} Usuario: {res.id}
                                    </span>
                                    <span className="text-xs font-black uppercase tracking-widest">{res.msg}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
